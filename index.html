<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>MuseTable</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f1a;--surface:#1a1a2e;--card:#16213e;--accent:#e94560;--gold:#f5c518;--text:#eee;--muted:#888;--green:#2ecc71;--red:#e74c3c}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:16px}
#app{height:100%;display:flex;flex-direction:column}
.screen{display:none;flex-direction:column;height:100%;width:100%;position:absolute;top:0;left:0}
.screen.active{display:flex}
input,button,select{font:inherit;border:none;outline:none;border-radius:8px}
input{background:var(--card);color:var(--text);padding:12px 16px;width:100%}
select{background:var(--card);color:var(--text);padding:12px 16px;width:100%;cursor:pointer;-webkit-appearance:none;appearance:none}
button{cursor:pointer;padding:14px 24px;font-weight:600;transition:.15s}
button:active{transform:scale(.96)}
.btn-primary{background:var(--accent);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-gold{background:var(--gold);color:#111}
.btn-outline{background:transparent;border:2px solid var(--muted);color:var(--text)}
/* ---------- LOBBY ---------- */
#screen-lobby{justify-content:center;align-items:center;padding:24px;gap:24px}
.lobby-box{background:var(--surface);border-radius:16px;padding:32px 24px;width:100%;max-width:400px;display:flex;flex-direction:column;gap:16px}
.lobby-box h1{text-align:center;font-size:1.8rem;letter-spacing:-.5px}
.lobby-box .sub{text-align:center;color:var(--muted);font-size:.85rem;margin-top:-8px}
.lobby-box hr{border:none;border-top:1px solid #333;margin:8px 0}
.lobby-box .row{display:flex;gap:8px}
.lobby-box .row input{flex:1}
.lobby-box .row button{flex-shrink:0}
/* ---------- ROOM (waiting) ---------- */
#screen-room{justify-content:center;align-items:center;padding:24px;gap:24px}
.room-box{background:var(--surface);border-radius:16px;padding:32px 24px;width:100%;max-width:400px;display:flex;flex-direction:column;gap:16px;text-align:center}
.room-box .code{font-size:3rem;font-weight:800;letter-spacing:8px;color:var(--gold);cursor:pointer;user-select:all}
.room-box .code-label{color:var(--muted);font-size:.85rem}
.player-list{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:8px 0}
.player-tag{background:var(--card);padding:6px 14px;border-radius:20px;font-size:.9rem}
/* ---------- GAME ---------- */
#screen-game{overflow-y:auto}
.game-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--surface);flex-shrink:0;gap:8px}
.game-header .room-info{display:flex;align-items:center;gap:8px}
.game-header .room-info .code-badge{background:var(--card);padding:4px 10px;border-radius:6px;font-weight:700;font-size:.9rem;letter-spacing:2px;color:var(--gold);cursor:pointer}
.game-header .room-info .phase-badge{font-size:.75rem;color:var(--muted)}
.game-header .room-info .phase-badge + .phase-badge{margin-left:4px}
.game-header .game-nav{display:flex;gap:4px}
.game-header .game-nav button{padding:4px 8px;font-size:.8rem;border-radius:6px;background:var(--card);color:var(--text);white-space:nowrap}
.game-header .tools{display:flex;gap:6px}
.game-header .tools button{padding:6px 12px;font-size:.8rem;border-radius:6px;background:var(--card);color:var(--text)}
.game-header .tools button.active{background:var(--gold);color:#111}
/* Board : tous les joueurs */
.board{padding:16px;display:flex;flex-direction:column;gap:20px;flex:1}
.player-area{background:var(--surface);border-radius:12px;padding:14px;border:2px solid transparent}
.player-area.me{border-color:var(--gold);background:var(--card)}
.player-area .p-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.player-area .p-header .p-name{font-weight:600;font-size:.95rem}
.player-area .p-header .p-name.anonyme{color:var(--muted);font-style:italic}
.player-area .p-header .p-score{font-weight:700;font-size:1.1rem}
.player-area .p-header .p-score.bust{color:var(--red)}
.player-area .p-header .p-score.blackjack{color:var(--gold)}
.player-area .p-status{font-size:.8rem;color:var(--muted)}
.cards-row{display:flex;gap:6px;flex-wrap:wrap}
/* Cartes en éventail (2-5) */
.cards-row.fan{display:flex;gap:2px;flex-wrap:nowrap;justify-content:center;padding:4px 0}
.cards-row.fan .card{transform:rotate(calc(var(--i,0)*4deg - 8deg));transform-origin:bottom center;margin-left:-16px}
.cards-row.fan .card:first-child{margin-left:0}
.cards-row.fan .card:last-child{margin-right:8px}
/* Cartes en grille (6+) */
.cards-row.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:4px}
.card{width:64px;height:89px;border-radius:8px;flex-shrink:0;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;position:relative}
.pyramide-card{width:48px;height:64px;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:700;font-size:.9rem;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.pyramide-card .pv{font-size:1.1rem;font-weight:800;line-height:1.2}
.pyramide-card .ps{font-size:.75rem;line-height:1}
.card-inner{display:flex;flex-direction:column;align-items:center;gap:2px}
.card-value{font-size:1.6rem;font-weight:800;line-height:1}
.card-suit{font-size:1.2rem;line-height:1}
.card.red{color:#d32f2f}
.card.black{color:#222}
/* Dés visuels — agrandis ×1.5 + animation */
.dice{width:84px;height:84px;background:#fff;border-radius:12px;box-shadow:0 2px 6px rgba(0,0,0,.3);padding:10px;display:flex;align-items:center;justify-content:center;transition:transform .1s}
.dice.rolling{animation:dice-roll .12s infinite alternate}
@keyframes dice-roll{0%{transform:rotate(-6deg) scale(0.95)}100%{transform:rotate(6deg) scale(1.05)}}
.dice-grid{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);width:100%;height:100%}
.dot{width:12px;height:12px;background:#222;border-radius:50%;align-self:center;justify-self:center}
/* Controls */
.controls{flex-shrink:0;padding:16px;display:flex;gap:12px;justify-content:center;background:var(--surface);border-top:1px solid #222}
.controls button{flex:1;max-width:180px;padding:16px;font-size:1.1rem;border-radius:12px;font-weight:700}
.controls button:disabled{opacity:.4;cursor:not-allowed;transform:none}
/* Status */
.game-status{padding:12px 16px;text-align:center;font-size:1rem;flex-shrink:0}
.game-status.winner{background:var(--gold);color:#111;font-weight:700}
.game-status.waiting{color:var(--muted)}
/* Result screen overlay */
#result-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;justify-content:center;align-items:center;flex-direction:column;gap:16px;padding:24px}
#result-overlay.show{display:flex}
#result-overlay h2{font-size:2rem;color:var(--gold)}
#result-overlay .winner-name{font-size:1.4rem;font-weight:600}
#result-overlay .scores{margin:8px 0;display:flex;flex-direction:column;gap:6px;align-items:center}
#result-overlay .scores span{font-size:1rem;color:var(--muted)}
#result-overlay .scores span b{color:var(--text)}
/* Board spectator mode */
#screen-game.spectator .controls{display:none}
/* Responsive */
@media(min-width:600px){
  .board{flex-direction:row;flex-wrap:wrap;justify-content:center;align-content:flex-start}
  .player-area{flex:0 1 280px}
  .card{width:80px;height:112px}
  .card-value{font-size:2rem}
  .card-suit{font-size:1.4rem}
}
/* Loader */
.loader{display:inline-block;width:20px;height:20px;border:2px solid var(--muted);border-top-color:var(--gold);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* Error toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--red);color:#fff;padding:12px 24px;border-radius:8px;font-weight:600;z-index:200;display:none;max-width:90%;text-align:center;font-size:.9rem;animation:fadeIn .3s}
#toast.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}}
</style>
</head>
<body>
<div id="app">

  <!-- ÉCRAN : Accueil -->
  <div id="screen-lobby" class="screen active">
    <div class="lobby-box">
      <h1>♠ MuseTable</h1>
      <p class="sub">table de jeu multijoueur</p>
      <input id="input-name" placeholder="Votre pseudo" maxlength="20">
      <select id="input-game">
        <option value="free">🃏 Libre</option>
        <option value="balatrow">🃏 Balatrow Solo</option>
        <option value="blackjack">♠ Blackjack</option>
        <option value="tarot">🎴 Tarot Africain</option>
        <option value="devine">🤯 Devine Tête</option>
        <option value="pyramide">🔺 Pyramide</option>
        <option value="bizkit">🎲 Bizkit</option>
      </select>
      <div id="devine-config" style="display:none;margin-top:8px">
        <div style="display:flex;gap:8px;align-items:center">
          <label style="color:var(--muted);font-size:.85rem;white-space:nowrap">⏱ Timer</label>
          <select id="devine-timer" style="flex:1">
            <option value="30">30s</option>
            <option value="45" selected>45s</option>
            <option value="60">60s</option>
          </select>
        </div>
        <div style="display:flex;gap:8px;align-items:center;margin-top:6px">
          <label style="color:var(--muted);font-size:.85rem;white-space:nowrap">📝 Mots</label>
          <select id="devine-mots" style="flex:1">
            <option value="4">4</option>
            <option value="6" selected>6</option>
            <option value="8">8</option>
            <option value="10">10</option>
          </select>
        </div>
      </div>
      <button class="btn-primary" id="btn-create">Créer une salle</button>
      <hr>
      <div class="row">
        <input id="input-code" placeholder="Code 4 chiffres" maxlength="4" inputmode="numeric" pattern="[0-9]*">
      </div>
      <div class="row">
        <input id="input-join-name" placeholder="Votre pseudo" maxlength="20">
        <button class="btn-green" id="btn-join">Rejoindre</button>
      </div>
      <p style="text-align:center;font-size:.8rem;color:var(--muted)">— ou —</p>
      <button class="btn-outline" id="btn-spectate">Mode spectateur</button>
    </div>
  </div>

  <!-- ÉCRAN : Salle d'attente -->
  <div id="screen-room" class="screen">
    <div class="room-box">
      <p class="code-label">Code de la salle</p>
      <div class="code" id="room-code-display">----</div>
      <p style="color:var(--muted);font-size:.85rem">Partagez ce code avec les autres joueurs</p>
      <p style="color:var(--muted);font-size:.85rem" id="room-game-type"></p>
      <div class="player-list" id="waiting-players"></div>
      <button class="btn-gold" id="btn-start">Lancer la partie</button>
      <button class="btn-outline" id="btn-leave">Quitter</button>
    </div>
  </div>

  <!-- ÉCRAN : Partie -->
  <div id="screen-game" class="screen">
    <div class="game-header">
      <div class="game-nav">
        <button id="btn-back-menu" title="Retour à l'accueil">← Menu</button>
        <button id="btn-reset-session" title="Réinitialiser la salle">🔄 Reset</button>
      </div>
      <div class="room-info">
        <span class="code-badge" id="game-code-badge">----</span>
        <span class="phase-badge" id="phase-badge">En attente</span>
        <span class="phase-badge" id="game-type-badge"></span>
      </div>
      <div class="tools">
        <button id="btn-fullscreen" title="Plein écran">⛶</button>
        <button id="btn-anonyme" title="Mode anonyme">👤</button>
      </div>
    </div>

    <div class="board" id="board"></div>

    <div class="game-status" id="game-status"></div>

    <div class="controls" id="controls"></div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>
</div>

<script src="public/js/common.js"></script>
<script src="public/js/game-blackjack.js"></script>
<script src="public/js/game-free.js"></script>
<script src="public/js/game-bizkit.js"></script>
<script src="public/js/game-tarot.js"></script>
<script src="public/js/game-devine.js"></script>
<script src="public/js/game-pyramide.js"></script>
<script src="public/js/game-balatrow.js"></script>
</body>
</html>
